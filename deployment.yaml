piVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
  labels:
   app: nginx-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-demo
  template:
    metadata:
      labels:
        app: nginx-demo
    spec:
      containers:
        - name: nginx-demo
          image: remanan/nginxdemos-hello:v1.0-Remanan
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-demo-svc
spec:
  type: ClusterIP
  selector:
    app: nginx-demo
ports:
  - port: 80
    targetPort: 80i
